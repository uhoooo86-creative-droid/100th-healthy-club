<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100세 건강 해결사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0a;
    --surface: #111811;
    --card: #141f14;
    --green: #4ade80;
    --green-dim: #22c55e;
    --gold: #fbbf24;
    --red: #f87171;
    --text: #e8f5e9;
    --muted: #6b8f6b;
    --border: #1e3320;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(74,222,128,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(251,191,36,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }

  /* Header */
  header {
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    position: relative;
  }

  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #0a0f0a;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--text);
  }

  h1 span {
    color: var(--green);
    display: block;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-top: 12px;
    letter-spacing: 1px;
  }

  /* Step indicator */
  .steps {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .step-btn {
    flex: 1;
    padding: 14px 8px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .step-btn:last-child { border-right: none; }

  .step-btn.active {
    background: var(--green);
    color: #0a0f0a;
    font-weight: 700;
  }

  .step-num {
    display: block;
    font-size: 10px;
    opacity: 0.6;
    margin-bottom: 2px;
  }

  /* Panels */
  .panel { display: none; animation: fadeIn 0.4s ease; }
  .panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Section titles */
  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text);
  }

  .section-desc {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* Symptom Grid */
  .symptom-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .symptom-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    gap: 10px;
    user-select: none;
  }

  .symptom-card:hover {
    border-color: var(--green-dim);
    transform: translateY(-2px);
  }

  .symptom-card.selected {
    background: rgba(74,222,128,0.08);
    border-color: var(--green);
  }

  .symptom-card.selected .check-circle {
    background: var(--green);
    border-color: var(--green);
  }

  .symptom-card.selected .check-circle::after {
    opacity: 1;
  }

  .check-circle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    flex-shrink: 0;
    position: relative;
    transition: all 0.2s;
  }

  .check-circle::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #0a0f0a;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .symptom-emoji { font-size: 18px; }
  .symptom-name { font-size: 13px; font-weight: 500; }

  /* Analyze button */
  .analyze-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #4ade80, #22c55e);
    color: #0a0f0a;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
  }

  .analyze-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(74,222,128,0.3);
  }

  .analyze-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Result cards */
  .result-section {
    margin-bottom: 28px;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .result-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .icon-red { background: rgba(248,113,113,0.15); }
  .icon-green { background: rgba(74,222,128,0.15); }
  .icon-gold { background: rgba(251,191,36,0.15); }
  .icon-blue { background: rgba(96,165,250,0.15); }

  .result-header h3 {
    font-size: 16px;
    font-weight: 700;
  }

  .result-header span.tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: auto;
  }

  .tag-red { background: rgba(248,113,113,0.15); color: #f87171; }
  .tag-green { background: rgba(74,222,128,0.15); color: #4ade80; }

  /* Food item cards */
  .food-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
  }

  .food-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    position: relative;
    overflow: hidden;
  }

  .food-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }

  .food-item.avoid::before { background: var(--red); }
  .food-item.eat::before { background: var(--green); }

  .food-emoji { font-size: 28px; margin-bottom: 8px; }
  .food-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .food-reason { font-size: 11px; color: var(--muted); line-height: 1.5; }

  .food-tip {
    margin-top: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.5;
  }

  .food-tip.avoid-tip { background: rgba(248,113,113,0.1); color: #fca5a5; }
  .food-tip.eat-tip { background: rgba(74,222,128,0.1); color: #86efac; }

  /* Warning alert */
  .warning-box {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
  }

  .warning-box .icon { font-size: 20px; flex-shrink: 0; }
  .warning-box p { font-size: 13px; color: #fde68a; line-height: 1.6; }

  /* Lifestyle tips */
  .tip-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .tip-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .tip-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--green);
    color: #0a0f0a;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .tip-text { font-size: 13px; line-height: 1.7; color: #c8e6c9; }
  .tip-text strong { color: var(--green); }

  /* Score card */
  .score-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .score-card::after {
    content: '🌿';
    position: absolute;
    font-size: 100px;
    opacity: 0.04;
    right: -10px;
    bottom: -20px;
  }

  .score-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; margin-bottom: 8px; }

  .score-number {
    font-family: 'Noto Serif KR', serif;
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }

  .score-sub { font-size: 14px; color: var(--muted); }

  /* Back button */
  .back-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 24px;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
  }

  .back-btn:hover { border-color: var(--green); color: var(--green); }

  /* Responsive */
  @media (max-width: 500px) {
    .symptom-grid { grid-template-columns: 1fr 1fr; }
    .food-grid { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 28px; }
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .loading-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    margin: 0 3px;
    animation: bounce 1.2s ease-in-out infinite;
  }

  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.8); opacity: 0.4; }
    40% { transform: scale(1.2); opacity: 1; }
  }

  .loading p { margin-top: 20px; font-size: 14px; }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .selected-tag {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    color: var(--green);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-badge">🌿 나만의 건강 해결사</div>
    <h1>100세까지<span>뛰어다니려면?</span></h1>
    <p class="subtitle">증상 체크 → AI 분석 → 맞춤 식단 & 생활 처방</p>
  </header>

  <div class="steps">
    <button class="step-btn active" onclick="goStep(0)">
      <span class="step-num">STEP 1</span>증상 체크
    </button>
    <button class="step-btn" onclick="goStep(1)" id="step2btn">
      <span class="step-num">STEP 2</span>AI 분석중
    </button>
    <button class="step-btn" onclick="goStep(2)" id="step3btn">
      <span class="step-num">STEP 3</span>맞춤 처방
    </button>
  </div>

  <!-- PANEL 1: 증상 체크 -->
  <div class="panel active" id="panel0">
    <div class="section-title">지금 어떤 증상이 있나요?</div>
    <p class="section-desc">해당하는 증상을 모두 선택해주세요. 선택할수록 더 정확한 맞춤 처방을 받을 수 있어요.</p>

    <div class="symptom-grid">
      <div class="symptom-card" onclick="toggleSymptom(this, '만성 피로')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">😴</span>
        <span class="symptom-name">항상 피곤함</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '소화 불량')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🤢</span>
        <span class="symptom-name">소화 불량·속쓰림</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '무릎·관절 통증')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🦵</span>
        <span class="symptom-name">무릎·관절 통증</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '고혈압')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">💓</span>
        <span class="symptom-name">고혈압</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '당뇨·혈당 불안')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🩺</span>
        <span class="symptom-name">당뇨·혈당 불안</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '기억력 저하')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🧠</span>
        <span class="symptom-name">기억력 저하</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '수면 장애')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🌙</span>
        <span class="symptom-name">불면·수면 장애</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '복부 비만')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🍩</span>
        <span class="symptom-name">복부 비만</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '면역력 저하')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🤧</span>
        <span class="symptom-name">잦은 감기·면역 저하</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '피부 트러블')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">😤</span>
        <span class="symptom-name">피부 트러블·건조</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '콜레스테롤')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">🩸</span>
        <span class="symptom-name">콜레스테롤 높음</span>
      </div>
      <div class="symptom-card" onclick="toggleSymptom(this, '눈 피로·시력저하')">
        <div class="check-circle"></div>
        <span class="symptom-emoji">👁️</span>
        <span class="symptom-name">눈 피로·시력 저하</span>
      </div>
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="startAnalysis()" disabled>
      증상을 선택해주세요
    </button>
  </div>

  <!-- PANEL 2: 로딩 -->
  <div class="panel" id="panel1">
    <div class="loading">
      <div>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>
      <p>선택하신 증상을 분석하고 있어요...<br>맞춤 처방을 준비 중입니다 🌿</p>
    </div>
  </div>

  <!-- PANEL 3: 결과 -->
  <div class="panel" id="panel2">
    <div id="resultContent"></div>
    <button class="back-btn" onclick="resetAll()">← 다시 체크하기</button>
  </div>
</div>

<script>
const selectedSymptoms = new Set();

const DB = {
  '만성 피로': {
    color: '#f87171',
    summary: '부신 피로·영양 결핍 가능성',

      { emoji: '🍫', name: '설탕·단음식', reason: '혈당 스파이크 후 급격한 에너지 저하', tip: '과자, 빵, 탄산음료 줄이기' },
      { emoji: '🍺', name: '알코올', reason: '수면의 질 저하로 피로 악화', tip: '주 2회, 1잔 이내로 제한' },
    ],
    eat: [
      { emoji: '🥩', name: '소고기(살코기)', reason: '철분·B12로 에너지 생산', tip: '삼겹살 ❌ → 안심·등심 ✅' },
      { emoji: '🥚', name: '달걀', reason: '완전단백질 + 비타민B군', tip: '하루 2개, 삶아서 먹기' },

      { emoji: '🐟', name: '연어·고등어', reason: '오메가3로 염증·피로 완화', tip: '주 3회 이상' },

  '소화 불량': {

    avoid: [
      { emoji: '🍗', name: '기름진 튀김류', reason: '위 배출 지연, 역류 악화', tip: '삼겹살 기름 부위는 반드시 제거하고 구워 먹기' },
      { emoji: '🌶️', name: '과도한 매운 음식', reason: '위 점막 자극·염증', tip: '국물 음식보다 찌개류 섭취 줄이기' },
      { emoji: '🥛', name: '우유(유당불내증)', reason: '가스·더부룩함 유발', tip: '무유당 우유나 식물성 밀크로 대체' },
    ],
    eat: [
      { emoji: '🥦', name: '브로콜리', reason: '위 점막 보호·H.pylori 억제', tip: '살짝 데쳐서 섭취' },
      { emoji: '🍠', name: '고구마', reason: '식이섬유로 장 운동 촉진', tip: '밥 대신 고구마 한 개' },
      { emoji: '🫙', name: '요거트(무가당)', reason: '프로바이오틱스로 장 환경 개선', tip: '아침 공복 직후 섭취' },
      { emoji: '🫚', name: '올리브오일', reason: '위 점막 보호·염증 완화', tip: '샐러드에 한 스푼' },

      { emoji: '📱', name: '장시간 화면', reason: '청색광+눈 깜빡임 감소 → 건조증', tip: '20-20-20 법칙: 20분마다 20초 쉬기' },
      { emoji: '🚬', name: '흡연', reason: '황반변성 위험 2~3배 증가', tip: '흡연자라면 금연이 시력 보호 최우선' },
    ],
    eat: [
      { emoji: '🫐', name: '블루베리·빌베리', reason: '안토시아닌이 망막 혈관 강화', tip: '매일 한 줌 필수' },
      { emoji: '🥕', name: '당근·고구마', reason: '베타카로틴 → 비타민A → 야간 시력', tip: '올리브오일에 살짝 볶아서' },
      { emoji: '🥬', name: '시금치·케일', reason: '루테인+제아잔틴이 황반 보호', tip: '루테인 보충제 병행 권장' },
      { emoji: '🐟', name: '연어·참치', reason: '오메가3가 건조증·염증 완화', tip: '인공눈물보다 오메가3가 근본 해결' },
    ],
    tips: [
      '<strong>루테인+지아잔틴</strong> 보충제 — 황반변성 예방에 임상 근거 있음',
      '자외선 차단 선글라스 — <strong>UV400</strong> 인증 제품 착용',
      '안압 측정 — <strong>40세 이후 매년</strong> 녹내장 조기 발견 필수',
    ]
  },
};

function toggleSymptom(el, name) {
  el.classList.toggle('selected');
  if (selectedSymptoms.has(name)) {
    selectedSymptoms.delete(name);
  } else {
    selectedSymptoms.add(name);
  }
  const btn = document.getElementById('analyzeBtn');
  if (selectedSymptoms.size > 0) {
    btn.disabled = false;
    btn.textContent = `${selectedSymptoms.size}개 증상 분석하기 →`;
  } else {
    btn.disabled = true;
    btn.textContent = '증상을 선택해주세요';
  }
}

function goStep(n) {
  document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === n));
  document.querySelectorAll('.step-btn').forEach((b, i) => b.classList.toggle('active', i === n));
}

function startAnalysis() {
  goStep(1);
  setTimeout(buildResult, 2200);
}

function buildResult() {
  const symptoms = Array.from(selectedSymptoms);
  const container = document.getElementById('resultContent');

  // Score
  const score = Math.max(60, 100 - symptoms.length * 7 + Math.floor(Math.random() * 5));
  const scoreColor = score >= 85 ? '#4ade80' : score >= 70 ? '#fbbf24' : '#f87171';
  const scoreMsg = score >= 85 ? '관리만 잘 하면 100세도 거뜬해요!' : score >= 70 ? '지금 시작하면 충분히 만회 가능!' : '지금 당장 집중 관리가 필요해요!';

  let html = `
    <div class="score-card">
      <div class="score-label">현재 건강 관리 점수</div>
      <div class="score-number" style="color:${scoreColor}">${score}<span style="font-size:24px">점</span></div>
      <div class="score-sub">${scoreMsg}</div>
    </div>

    <div class="selected-tags">
      ${symptoms.map(s => `<span class="selected-tag">✓ ${s}</span>`).join('')}
    </div>

    <div class="warning-box">
      <span class="icon">⚠️</span>
      <p>이 정보는 일반적인 건강 정보이며, 의료 진단을 대체할 수 없습니다. 증상이 심각하거나 지속된다면 반드시 전문의와 상담하세요.</p>
    </div>
  `;

  // Collect all avoid and eat items
  const allAvoid = [];
  const allEat = [];
  const allTips = [];

  symptoms.forEach(sym => {
    const d = DB[sym];
    if (!d) return;
    d.avoid.forEach(item => { if (!allAvoid.find(a => a.name === item.name)) allAvoid.push(item); });
    d.eat.forEach(item => { if (!allEat.find(a => a.name === item.name)) allEat.push(item); });
    d.tips.forEach(tip => { if (!allTips.includes(tip)) allTips.push(tip); });
  });

  // Avoid section
  html += `
    <div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-red">🚫</div>
        <h3>피해야 할 것들</h3>
        <span class="tag tag-red">주의 ${allAvoid.length}개</span>
      </div>
      <div class="food-grid">
        ${allAvoid.slice(0, 8).map(item => `
          <div class="food-item avoid">
            <div class="food-emoji">${item.emoji}</div>
            <div class="food-name">${item.name}</div>
            <div class="food-reason">${item.reason}</div>
            <div class="food-tip avoid-tip">💡 ${item.tip}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="divider"></div>
  `;

  // Eat section
  html += `
    <div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-green">✅</div>
        <h3>꼭 먹어야 할 것들</h3>
        <span class="tag tag-green">추천 ${allEat.length}개</span>
      </div>
      <div class="food-grid">
        ${allEat.slice(0, 8).map(item => `
          <div class="food-item eat">
            <div class="food-emoji">${item.emoji}</div>
            <div class="food-name">${item.name}</div>
            <div class="food-reason">${item.reason}</div>
            <div class="food-tip eat-tip">✅ ${item.tip}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="divider"></div>
  `;

  // Lifestyle tips
  html += `
    <div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-gold">💡</div>
        <h3>100세 생활 처방</h3>
      </div>
      <div class="tip-list">
        ${allTips.slice(0, 8).map((tip, i) => `
          <div class="tip-item">
            <div class="tip-num">${i + 1}</div>
            <div class="tip-text">${tip}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="result-section">
      <div class="result-header">
        <div class="result-icon icon-blue">🌿</div>
        <h3>100세 공통 황금 수칙</h3>
      </div>
      <div class="tip-list">
        <div class="tip-item">
          <div class="tip-num">🏃</div>
          <div class="tip-text"><strong>매일 30분 걷기</strong> — 사망률 35% 감소, 치매 40% 예방. 비용 0원의 최고 약</div>
        </div>
        <div class="tip-item">
          <div class="tip-num">😴</div>
          <div class="tip-text"><strong>수면 7~8시간</strong> — 수면 부족은 비만, 당뇨, 치매, 심장병 동시 위험</div>
        </div>
        <div class="tip-item">
          <div class="tip-num">🤝</div>
          <div class="tip-text"><strong>사회적 관계 유지</strong> — 외로움은 하루 15개비 흡연과 동일한 수명 단축 효과</div>
        </div>
        <div class="tip-item">
          <div class="tip-num">🧠</div>
          <div class="tip-text"><strong>평생 배우기</strong> — 새로운 학습이 신경 연결을 만들고 치매를 예방</div>
        </div>
        <div class="tip-item">
          <div class="tip-num">🩺</div>
          <div class="tip-text"><strong>정기 검진</strong> — 건강검진 성실히 받는 사람이 평균 5년 더 삶</div>
        </div>
      </div>
    </div>
  `;

  container.innerHTML = html;
  goStep(2);
}

function resetAll() {
  selectedSymptoms.clear();
  document.querySelectorAll('.symptom-card').forEach(c => c.classList.remove('selected'));
  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = '증상을 선택해주세요';
  goStep(0);
}
</script>
</body>
</html>
